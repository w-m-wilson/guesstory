<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Grenze+Gotisch:wght@600&family=VT323&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fdf6e3" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0d0905" />
    <meta name="google-site-verification" content="hkXEv4qmm5-VswLTTtfVV4QaDiUlz8EK7de7Dn1EXzQ" />
    <title>Guesstory</title>
    <script>
      (function(){try{var t=localStorage.getItem('guesstory-appearance');if(!t)return;var s=JSON.parse(t),c=s.scheme||'guesstory',m=s.mode||'system',d=m==='dark'||(m==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.dataset.theme=c+'-'+(d?'dark':'light')}catch(e){}})()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
